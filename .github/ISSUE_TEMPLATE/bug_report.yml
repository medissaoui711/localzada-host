name: Bug report
description: Something isn't working the way it should
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below so we can reproduce it.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `localzada start ...`, instead of starting, it...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected it to start the server and print the PID.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal sequence of commands that triggers the bug.
      placeholder: |
        1. `localzada doctor` (output is fine)
        2. `localzada start --port 3000 -- npm run dev`
        3. ...
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Localzada version
      description: Output of `localzada --version`
      placeholder: '1.1.0'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - WSL
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: 'v20.10.0'
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: '`localzada doctor` output'
      description: Helps us spot environment issues fast.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output of `localzada logs <session>` or any error output.
      render: shell
