name: Feature request
description: Suggest a new capability or improvement
labels: ['enhancement', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Before we build, we want to understand the problem you're solving — not just the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the feature. What were you trying to do? Where did Localzada fall short?
      placeholder: I'm running QanunAI locally and my Telegram webhook URL keeps changing every time...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Localzada to do? Be concrete — example CLI commands, YAML snippets, or expected output help a lot.
      placeholder: |
        ```bash
        localzada tunnel up qanunai.example.dev --service http://localhost:8000
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried? Other tools that solve this differently?

  - type: dropdown
    id: tier
    attributes:
      label: Where does this fit?
      description: Help us decide whether this is core, free-tier, or pro-tier.
      options:
        - Free (essential to basic workflow)
        - Pro (advanced / commercial use case)
        - Either / not sure
    validations:
      required: true
