version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    reviewers:
      - 'YOUR_USERNAME'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      # Group dev-dependency bumps to reduce PR noise
      dev-dependencies:
        dependency-type: 'development'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'ci'
